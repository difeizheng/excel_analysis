# ====================================================================
# 同义词与实体消歧 synonyms.yaml
# 1) 实体消歧：模糊指代 → 具体行/口径
# 2) 指标同义词：用户口语 → 标准指标名
# ====================================================================

# --------- 实体消歧（测试用例1的硬规则）---------
entities:
  三峡国际:
    aliases: [公司, 本公司, 三峡国际, 三峡]
    means: 取三峡国际口径的数值
  集团:
    aliases: [集团, 集团公司, 上级集团, 母公司]
    means: 取集团口径的数值
  默认:
    description: 未指明实体时，默认按"三峡国际"口径取数

# --------- 指标同义词（口语 → 标准指标，metrics.yaml 中的 synonyms 也会被复用）---------
metric_aliases:
  利润: 利润总额            # 默认口径规则 R4
  发电: 发电量
  装机容量: 总装机
  装机数: 总装机
  风电: 风电发电量
  水电: 水电发电量
  光伏: 光伏发电量
  分红: 向集团分红          # 默认分红口径

# --------- 时间口语归一化---------
time_aliases:
  近一年: latest_year
  近三年: recent_3_years
  近五年: recent_5_years
  去年: previous_year
  今年: current_year

# --------- 模糊量词---------
quantity_aliases:
  累计: cumulative
  合计: total
  总共: total
