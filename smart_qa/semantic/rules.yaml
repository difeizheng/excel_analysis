# ====================================================================
# 业务规则 rules.yaml
# 这些规则是"防幻觉"的核心——领域知识必须固化，不能交给 LLM 每次推理
# 每条规则对应测试用例中的一个"坑"
# ====================================================================

# --------- R2 月度列 = 当年累计(YTD)  【测试用例3】---------
monthly_ytd:
  description: 财务数据表 2026 年的月度列（2026-01..2026-05）是当年累计值，不是单月值
  sheets: [财务数据]
  resolve_rule:
    "1月至N月": 取第 N 月列的值        # 已是 1..N 月累计
    "N月": 取第 N 月列的值
    forbid: 禁止把 1月列 + 2月列 相加（会重复计算）
  example:
    question: 26年1-2月累计向集团分红
    correct: 取 2026-02 列 = 516
    wrong: 2026-01(515) + 2026-02(516) = 1031   # 错误！

# --------- R3 近三年语义 + CAGR 期初  【测试用例4】---------
recent_years:
  anchor: 查询日期          # 以提问时的"当前年份"为锚
  current_year: 2026        # 本数据集上下文的"当前年"
  windows:
    近一年: [2025]
    近三年: [2023, 2024, 2025]   # 当前年前3个完整年
    近五年: [2021, 2022, 2023, 2024, 2025]
  cagr_initial_rule:
    description: "计算近N年 CAGR 时,期初取窗口前一年底值"
    近一年:
      window: [2025]
      initial_year: 2024
      end_year: 2025
      n: 1
      note: 近一年增长 = (2025-2024)/2024
    近三年:
      window: [2023, 2024, 2025]
      initial_year: 2022
      end_year: 2025
      n: 3
      note: 近三年增长应包含首年(2023)当年的增长,期初用2022年底
    近五年:
      window: [2021, 2022, 2023, 2024, 2025]
      initial_year: 2020
      end_year: 2025
      n: 5
      note: 近五年增长应包含首年(2021)当年的增长,期初用2020年底
# --------- R4 默认口径  【测试用例1、4】---------
default_scope:
  利润: 利润总额            # 未指明时"利润"=利润总额
  分红: 向集团分红          # 未指明时"分红"=向集团分红
  公司实体: 三峡国际        # 未指明实体时按三峡国际口径
  发电单位: 亿千瓦时        # 发电量默认用年度表(亿千瓦时)

# --------- CAGR 公式  【测试用例4】---------
cagr:
  formula: "(期末值 / 期初值) ^ (1 / 年数) - 1"
  excel_equivalent: RRI(nper, pv, fv)   # = RRI(年数, 期初, 期末)
  example:
    期初: 8.50   # 利润总额 2022
    期末: 10.00  # 利润总额 2025
    年数: 3
    result: 0.0557   # 5.57%

# --------- R5 分类归并  【测试用例6】---------
classification:
  风电:
    expand: [陆上风电, 海上风电]
    rule: 按发电量表"发电方式"列筛选，凡含"风电"的项目都计入
  求和去重:
    rule: 只对明细项目行求和，跳过区域小计行（一/二/三/四）和发电量合计行

# --------- R6 单位强约束 ---------
units:
  财务数据: 亿元
  装机: 万千瓦
  发电量_年度: 亿千瓦时
  发电量_月度: 万千瓦时        # 注意：与年度表单位不同！
  cross_table_warning: 跨表取数时各值保留各自单位，不可混算

# --------- 时间解析细则---------
time_resolution:
  年度列: "2011..2025，直接按年份定位"
  月度列: "2026-01..2026-05，按 年-月 定位，遵守 YTD 规则"
  区间: '"24年-26年2月" -> [2024年度, 2025年度, 2026年1-2月(YTD)]'

# --------- 数据质量标记---------
data_quality:
  转至参股:
    meaning: 该项目已从控股并表转为参股，发电量不再统计
    handling: 视为不可计算，跳过并在溯源中标注
  退化标记:
    "-": 项目退出/转出，视为缺失
    "√": 一带一路标记（分类，非数值）
  subtotal_rows:
    description: 以下行为小计/合计行，聚合时去重
    装机: [合计, 可控装机, 权益装机, 水电项目, 风电项目, 光伏项目, 新能源项目]
    发电量: [发电量合计, （一）巴西发电量情况统计, （二）南亚发电量情况统计, （三）欧洲发电量情况统计, （四）拉美发电量情况统计]
