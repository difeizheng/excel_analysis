# ====================================================================
# 分类树 taxonomy.yaml
# 定义指标的层级归并关系，用于"跨行条件聚合"
# 例：问"风电发电量" → 展开 = 陆上风电 + 海上风电 两类项目求和
# ====================================================================

# 发电方式分类（发电量表"发电方式"列的取值归并）
发电方式:
  风电:
    includes: [陆上风电, 海上风电]
    description: 风电包含陆上风电和海上风电两类
  水电:
    includes: [水电]
    description: 水力发电
  光伏:
    includes: [光伏]
    description: 太阳能光伏发电
  新能源:
    includes: [陆上风电, 海上风电, 光伏]
    description: 非水电的统称

# 装机分类（装机表）
装机类型:
  总装机:
    includes: [可控装机, 权益装机]
  可控装机:
    includes: [水电项目, 风电项目, 光伏项目]
    description: 自己控股运营的装机
  权益装机:
    description: 参股、按持股比例折算的装机

# 区域分类（发电量表）
区域:
  巴西: [巴西]
  南亚: [南亚, 巴基斯坦]
  欧洲: [欧洲, 德国, 西班牙, 希腊]
  拉美: [拉美, 墨西哥, 哥伦比亚, 秘鲁]

# 求和去重规则
aggregation_rules:
  avoid_subtotal_overlap:
    description: 求和时只用明细项目行，不混入区域小计行(一/二/三/四)，避免重复计入
  avoid_section_overlap:
    description: 可控装机与权益装机互斥，总装机取合计行而非两者相加
